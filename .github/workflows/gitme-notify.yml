name: GitMe Discord Notify

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, closed, reopened]
  issues:
    types: [opened, closed, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send Discord notification
        uses: ./
        with:
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
